<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара AudioMax Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <article class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow duration-300 overflow-hidden w-full max-w-md md:max-w-[800px] flex flex-col md:flex-row">
        
        <div class="w-full md:w-2/5 relative h-64 md:h-auto overflow-hidden">
            <img 
                src="https://picsum.photos/400/400?random=10" 
                alt="Наушники AudioMax Pro" 
                class="w-full h-full object-cover"
            >
            <span class="absolute top-4 left-4 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full">-33%</span>
        </div>

        <div class="w-full md:w-3/5 p-6 md:p-8 flex flex-col justify-between text-center md:text-left">
            
            <div>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">
                    Наушники AudioMax Pro
                </h2>

                <div class="flex items-center justify-center md:justify-start gap-1 mb-4">
                    <div class="flex text-yellow-400">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star-half-stroke"></i>
                    </div>
                    <span class="text-sm text-gray-500 ml-2">(4.5)</span>
                </div>

                <p class="text-gray-600 mb-6 leading-relaxed">
                    Беспроводные наушники с активным шумоподавлением, 40 часов работы и поддержкой Hi-Res audio. Идеальный звук в любой обстановке.
                </p>
            </div>

            <div class="flex flex-col gap-6">
                <div class="flex items-center justify-center md:justify-start gap-4">
                    <span class="text-3xl font-bold text-blue-600">$99</span>
                    <span class="text-xl text-gray-400 line-through font-medium">$149</span>
                </div>

                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 shadow-lg hover:shadow-blue-200">
                    <i class="fa-solid fa-cart-shopping"></i>
                    В корзину
                </button>
            </div>
        </div>

    </article>

</body>
</html>
